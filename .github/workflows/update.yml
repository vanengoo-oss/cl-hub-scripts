name: Hourly Update

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Update timestamp
        run: |
          date +%s > .lastupdate
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "update: $(date)" || exit 0
          git push
